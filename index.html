<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>VC Notes — защищённый блокнот с шифрованием</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: -apple-system, 'SF Pro Text', 'SF Pro Display', 'BlinkMacSystemFont', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #1C1C1E;
            overflow: hidden;
        }

        .navbar {
            background: rgba(28, 28, 30, 0.96);
            backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(84, 84, 88, 0.4);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo-area h1 {
            font-size: 22px;
            font-weight: 640;
            background: linear-gradient(135deg, #FFFFFF, #8E8E93);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-area p {
            font-size: 11px;
            color: #0A84FF;
            font-weight: 500;
        }

        .auth-compact {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(120, 120, 128, 0.12);
            padding: 6px 14px;
            border-radius: 32px;
            flex-wrap: wrap;
        }

        .auth-compact input {
            background: #2C2C2E;
            border: 0.5px solid rgba(84, 84, 88, 0.5);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 140px;
            transition: 0.2s;
            color: #FFFFFF;
        }

        .auth-compact input::placeholder {
            color: #8E8E93;
        }

        .auth-compact input:focus {
            border-color: #0A84FF;
            box-shadow: 0 0 0 2px rgba(10, 132, 255, 0.3);
        }

        .auth-compact button {
            background: #0A84FF;
            border: none;
            padding: 8px 18px;
            border-radius: 24px;
            color: white;
            font-weight: 590;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .auth-compact button.outline {
            background: rgba(120, 120, 128, 0.18);
            color: #FFFFFF;
        }

        .security-badge {
            background: rgba(10, 132, 255, 0.15);
            padding: 6px 14px;
            border-radius: 24px;
            font-size: 12px;
            font-weight: 500;
            color: #0A84FF;
            white-space: nowrap;
        }

        .backup-buttons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .small-link {
            background: rgba(120, 120, 128, 0.18);
            border: none;
            padding: 6px 14px;
            border-radius: 24px;
            color: #FFFFFF;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .small-link:hover {
            background: rgba(120, 120, 128, 0.3);
        }

        .main-split {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: rgba(0, 0, 0, 0.3);
        }

        .sidebar {
            width: 300px;
            background: rgba(28, 28, 30, 0.92);
            backdrop-filter: blur(20px);
            border-right: 0.5px solid rgba(84, 84, 88, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 16px 8px;
            border-bottom: 0.5px solid rgba(84, 84, 88, 0.3);
        }

        .notes-list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(28, 28, 30, 0.5);
        }

        .notes-list-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #FFFFFF;
        }

        .new-note-btn {
            background: #0A84FF;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 30px;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .notes-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }

        .note-item {
            background: #2C2C2E;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 0.5px solid rgba(84, 84, 88, 0.3);
        }

        .note-item:hover {
            background: #3A3A3C;
            transform: translateX(2px);
        }

        .note-item.active {
            background: #3A3A3C;
            border-left: 4px solid #0A84FF;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

        .note-title-preview {
            font-weight: 590;
            font-size: 15px;
            margin-bottom: 6px;
            color: #FFFFFF;
        }

        .note-date {
            font-size: 10px;
            color: #8E8E93;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1C1C1E;
            overflow: hidden;
        }

        .editor-toolbar {
            padding: 16px 24px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 0.5px solid rgba(84, 84, 88, 0.3);
            background: rgba(28, 28, 30, 0.8);
        }

        .editor-title-input {
            font-size: 24px;
            font-weight: 620;
            background: transparent;
            border: none;
            padding: 8px 0;
            font-family: inherit;
            outline: none;
            flex: 1;
            min-width: 180px;
            color: #FFFFFF;
        }

        .editor-title-input::placeholder {
            color: #636366;
        }

        .action-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background: rgba(120, 120, 128, 0.18);
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            color: #FFFFFF;
        }

        .icon-btn.danger {
            background: rgba(255, 69, 58, 0.2);
            color: #FF453A;
        }

        .editor-textarea {
            flex: 1;
            padding: 24px 28px;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            line-height: 1.55;
            font-family: inherit;
            resize: none;
            color: #FFFFFF;
        }

        .editor-textarea::placeholder {
            color: #636366;
        }

        .bottom-status {
            padding: 10px 24px;
            font-size: 11px;
            color: #8E8E93;
            border-top: 0.5px solid rgba(84, 84, 88, 0.3);
            display: flex;
            justify-content: space-between;
            background: rgba(28, 28, 30, 0.8);
        }

        .bottom-actions {
            display: flex;
            gap: 12px;
        }

        .notes-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .notes-scroll::-webkit-scrollbar-track {
            background: #1C1C1E;
            border-radius: 4px;
        }

        .notes-scroll::-webkit-scrollbar-thumb {
            background: #3A3A3C;
            border-radius: 4px;
        }

        @media (max-width: 850px) {
            .sidebar { width: 260px; }
            .auth-compact input { width: 110px; }
            .editor-title-input { font-size: 18px; }
            .backup-buttons { order: 3; width: 100%; justify-content: center; margin-top: 8px; }
        }

        @media (max-width: 750px) {
            .navbar { flex-direction: column; align-items: stretch; }
            .security-badge { text-align: center; }
            .auth-compact { justify-content: center; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div class="logo-area">
            <h1>📓 VC Notes</h1>
            <p>🔒 AES-GCM 256</p>
        </div>
        <div class="auth-compact">
            <input type="text" id="userIdInput" placeholder="Ваш ID" autocomplete="username" style="width:140px">
            <input type="password" id="masterPassInput" placeholder="Пароль" autocomplete="current-password" style="width:140px">
            <button id="authLoginBtn">Разблокировать</button>
            <button id="authLogoutBtn" class="outline">Выйти</button>
            <div class="backup-buttons">
                <button id="exportAllNotesBtn" class="small-link">🔒 Экспорт</button>
                <button id="importBackupBtn" class="small-link">📥 Импорт</button>
            </div>
        </div>
        <div class="security-badge" id="globalAuthBadge">🔒 Не авторизован</div>
    </div>

    <div class="main-split">
        <div class="sidebar">
            <div class="sidebar-header">
                <div id="authInfoMsg" style="font-size: 11px; color:#8E8E93; text-align:center; margin-bottom: 8px; min-height: 32px;"></div>
                <div class="notes-list-header">
                    <h3>Все заметки</h3>
                    <button id="createNewNoteBtn" class="new-note-btn" title="Новая заметка">+</button>
                </div>
            </div>
            <div class="notes-scroll" id="notesListContainer">
                <div style="padding: 24px; text-align:center; color:#8E8E93;">🔐 Авторизуйтесь</div>
            </div>
        </div>

        <div class="editor-panel">
            <div class="editor-toolbar">
                <input type="text" id="noteTitleEditor" class="editor-title-input" placeholder="Название заметки" autocomplete="off">
                <div class="action-group">
                    <button id="saveCurrentNoteBtn" class="icon-btn">💾 Сохранить</button>
                    <button id="deleteCurrentNoteBtn" class="icon-btn danger">🗑 Удалить</button>
                </div>
            </div>
            <textarea id="noteBodyEditor" class="editor-textarea" placeholder="Напишите что-нибудь... (всё шифруется AES-GCM)"></textarea>
            <div class="bottom-status">
                <span id="editorStatusMsg">● Ничего не выбрано</span>
                <div class="bottom-actions">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ========== СИСТЕМА УПРАВЛЕНИЯ СООБЩЕНИЯМИ (ФИКС) ==========
    let activeMessageTimeouts = {};
    
    function clearMessage(elementId) {
        const element = document.getElementById(elementId);
        if (element) {
            // Плавное исчезновение
            element.style.transition = 'opacity 0.5s ease-out';
            element.style.opacity = '0';
            setTimeout(() => {
                if (element.style.opacity === '0') {
                    element.textContent = '';
                    element.style.opacity = '1';
                    element.style.transition = '';
                    element.style.color = '#8E8E93';
                }
            }, 500);
        }
        if (activeMessageTimeouts[elementId]) {
            clearTimeout(activeMessageTimeouts[elementId]);
            delete activeMessageTimeouts[elementId];
        }
    }
    
    function showMessage(elementId, text, isError = false, duration = 10000) {
        const element = document.getElementById(elementId);
        if (!element) return;
        
        // Очищаем предыдущий таймер для этого элемента
        if (activeMessageTimeouts[elementId]) {
            clearTimeout(activeMessageTimeouts[elementId]);
            delete activeMessageTimeouts[elementId];
        }
        
        // Сбрасываем анимацию
        element.style.transition = '';
        element.style.opacity = '1';
        
        // Устанавливаем текст и цвет
        element.textContent = text;
        element.style.color = isError ? '#FF453A' : '#0A84FF';
        
        // Устанавливаем таймер на очистку
        activeMessageTimeouts[elementId] = setTimeout(() => {
            clearMessage(elementId);
        }, duration);
    }
    
    function showStatusMessage(elementId, text, duration = 3000) {
        const element = document.getElementById(elementId);
        if (!element) return;
        
        // Очищаем предыдущий таймер
        if (activeMessageTimeouts[elementId]) {
            clearTimeout(activeMessageTimeouts[elementId]);
            delete activeMessageTimeouts[elementId];
        }
        
        element.style.transition = '';
        element.style.opacity = '1';
        element.textContent = text;
        element.style.color = '#8E8E93';
        
        activeMessageTimeouts[elementId] = setTimeout(() => {
            clearMessage(elementId);
            // Возвращаем стандартный текст после очистки
            setTimeout(() => {
                if (elementId === 'editorStatusMsg' && element.textContent === '') {
                    element.textContent = '● Ничего не выбрано';
                    element.style.color = '#8E8E93';
                }
            }, 500);
        }, duration);
    }

    // ========== КРИПТОГРАФИЧЕСКОЕ ЯДРО ==========
    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: salt, iterations: 210000, hash: "SHA-256" },
            keyMaterial,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    async function encryptData(plainObject, password) {
        const plainJson = JSON.stringify(plainObject);
        const encoder = new TextEncoder();
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encoder.encode(plainJson));
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0);
        combined.set(iv, salt.length);
        combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode(...combined));
    }

    async function decryptData(encryptedBase64, password) {
        const combined = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
        const salt = combined.slice(0, 16);
        const iv = combined.slice(16, 16+12);
        const ciphertext = combined.slice(16+12);
        const key = await deriveKey(password, salt);
        try {
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ciphertext);
            const jsonStr = new TextDecoder().decode(decrypted);
            return JSON.parse(jsonStr);
        } catch(e) {
            throw new Error("Неверный пароль или данные повреждены");
        }
    }

    // ========== ХРАНИЛИЩЕ В LOCALSTORAGE ==========
    const STORAGE_PREFIX = "vc_secure_notes_v1";

    function getStorageKey(userId) {
        return `${STORAGE_PREFIX}_${userId}`;
    }

    async function saveEncryptedNotesCollection(userId, password, notesCollection) {
        const encrypted = await encryptData(notesCollection, password);
        localStorage.setItem(getStorageKey(userId), encrypted);
    }

    async function loadEncryptedNotesCollection(userId, password) {
        const raw = localStorage.getItem(getStorageKey(userId));
        if (!raw) return { notes: {}, nextId: 1 };
        return await decryptData(raw, password);
    }

    // ========== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ==========
    let currentUserId = null;
    let currentPassword = null;
    let notesData = { notes: {}, nextId: 1 };
    let currentNoteId = null;

    // DOM элементы
    const userIdInput = document.getElementById('userIdInput');
    const masterPassInput = document.getElementById('masterPassInput');
    const authLoginBtn = document.getElementById('authLoginBtn');
    const authLogoutBtn = document.getElementById('authLogoutBtn');
    const notesListContainer = document.getElementById('notesListContainer');
    const createNewNoteBtn = document.getElementById('createNewNoteBtn');
    const noteTitleEditor = document.getElementById('noteTitleEditor');
    const noteBodyEditor = document.getElementById('noteBodyEditor');
    const saveCurrentNoteBtn = document.getElementById('saveCurrentNoteBtn');
    const deleteCurrentNoteBtn = document.getElementById('deleteCurrentNoteBtn');
    const globalAuthBadge = document.getElementById('globalAuthBadge');
    const exportAllNotesBtn = document.getElementById('exportAllNotesBtn');
    const importBackupBtn = document.getElementById('importBackupBtn');

    async function refreshUI() {
        if (!currentUserId || !currentPassword) {
            notesListContainer.innerHTML = '<div style="padding: 24px; text-align:center; color:#8E8E93;">🔐 Введите ID и пароль, нажмите "Разблокировать"</div>';
            globalAuthBadge.innerText = '🔒 Не авторизован';
            noteTitleEditor.value = '';
            noteBodyEditor.value = '';
            document.getElementById('editorStatusMsg').textContent = '● Заблокировано';
            currentNoteId = null;
            return;
        }
        globalAuthBadge.innerText = `🔓 Активно: ${currentUserId}`;
        try {
            notesData = await loadEncryptedNotesCollection(currentUserId, currentPassword);
            if (!notesData.notes) notesData.notes = {};
            if (!notesData.nextId) notesData.nextId = 1;
        } catch (err) {
            showMessage('authInfoMsg', `❌ ${err.message}`, true);
            notesListContainer.innerHTML = `<div style="padding:20px;color:#FF453A;">❌ Неверный пароль</div>`;
            return;
        }
        renderNotesList();
        if (currentNoteId && notesData.notes[currentNoteId]) {
            loadNoteIntoEditor(currentNoteId);
        } else if (Object.keys(notesData.notes).length > 0) {
            const firstId = Object.keys(notesData.notes)[0];
            currentNoteId = firstId;
            loadNoteIntoEditor(currentNoteId);
        } else {
            currentNoteId = null;
            noteTitleEditor.value = '';
            noteBodyEditor.value = '';
            document.getElementById('editorStatusMsg').textContent = '📝 Нет заметок, нажмите +';
        }
    }

    function renderNotesList() {
        if (!notesData.notes || Object.keys(notesData.notes).length === 0) {
            notesListContainer.innerHTML = '<div style="padding: 24px; text-align:center; color:#8E8E93;">📭 Нет заметок. Нажмите +</div>';
            return;
        }
        const sorted = Object.entries(notesData.notes).sort((a,b) => (b[1].updatedAt || 0) - (a[1].updatedAt || 0));
        notesListContainer.innerHTML = sorted.map(([id, note]) => {
            const preview = note.title ? note.title.substring(0, 40) : (note.body.substring(0, 30) || "Без названия");
            const date = note.updatedAt ? new Date(note.updatedAt).toLocaleString() : "недавно";
            const activeClass = (currentNoteId == id) ? 'active' : '';
            return `
                <div class="note-item ${activeClass}" data-id="${id}">
                    <div class="note-title-preview">${escapeHtml(preview)}</div>
                    <div class="note-date">${escapeHtml(date)}</div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.note-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const id = el.getAttribute('data-id');
                if (id && notesData.notes[id]) {
                    currentNoteId = id;
                    loadNoteIntoEditor(currentNoteId);
                    renderNotesList();
                }
            });
        });
    }

    function loadNoteIntoEditor(id) {
        const note = notesData.notes[id];
        if (!note) return;
        noteTitleEditor.value = note.title || '';
        noteBodyEditor.value = note.body || '';
    }

    async function saveCurrentNote() {
        if (!currentUserId || !currentPassword) {
            showMessage('authInfoMsg', '❌ Авторизуйтесь перед сохранением', true);
            return;
        }
        const title = noteTitleEditor.value.trim();
        const body = noteBodyEditor.value;
        if (!title && !body) {
            showStatusMessage('editorStatusMsg', '⚠️ Нельзя сохранить пустую заметку', 3000);
            return;
        }
        let noteId = currentNoteId;
        if (!noteId || !notesData.notes[noteId]) {
            noteId = String(notesData.nextId || 1);
            notesData.nextId = parseInt(noteId) + 1;
            notesData.notes[noteId] = {
                title: title || "Новая заметка",
                body: body,
                createdAt: Date.now(),
                updatedAt: Date.now()
            };
        } else {
            notesData.notes[noteId].title = title || "Без названия";
            notesData.notes[noteId].body = body;
            notesData.notes[noteId].updatedAt = Date.now();
        }
        currentNoteId = noteId;
        try {
            await saveEncryptedNotesCollection(currentUserId, currentPassword, { notes: notesData.notes, nextId: notesData.nextId });
            showStatusMessage('editorStatusMsg', '✅ Сохранено и зашифровано', 3000);
            await refreshUI();
        } catch (err) {
            showMessage('authInfoMsg', `❌ Ошибка: ${err.message}`, true);
        }
    }

    async function deleteCurrentNote() {
        if (!currentNoteId || !notesData.notes[currentNoteId]) return;
        if (!confirm('Удалить заметку безвозвратно?')) return;
        delete notesData.notes[currentNoteId];
        const remainingIds = Object.keys(notesData.notes);
        currentNoteId = remainingIds.length > 0 ? remainingIds[0] : null;
        try {
            await saveEncryptedNotesCollection(currentUserId, currentPassword, { notes: notesData.notes, nextId: notesData.nextId });
            await refreshUI();
            showStatusMessage('editorStatusMsg', currentNoteId ? '🗑 Заметка удалена' : '📭 Все заметки удалены', 3000);
        } catch (err) {
            showMessage('authInfoMsg', `❌ Ошибка: ${err.message}`, true);
        }
    }

    async function createNewNote() {
        if (!currentUserId || !currentPassword) {
            showMessage('authInfoMsg', '❌ Сначала выполните вход', true);
            return;
        }
        currentNoteId = null;
        noteTitleEditor.value = '';
        noteBodyEditor.value = '';
        showStatusMessage('editorStatusMsg', '✏️ Новая заметка (нажмите Сохранить)', 3000);
    }

    async function login() {
        const userId = userIdInput.value.trim();
        const password = masterPassInput.value;
        if (!userId || !password) {
            showMessage('authInfoMsg', '❌ Введите ID и пароль', true);
            return;
        }
        currentUserId = userId;
        currentPassword = password;
        try {
            const test = await loadEncryptedNotesCollection(userId, password);
            notesData = test;
            if (!notesData.notes) notesData.notes = {};
            if (!notesData.nextId) notesData.nextId = 1;
            await refreshUI();
            const count = Object.keys(notesData.notes).length;
            showMessage('authInfoMsg', `✅ Доступ открыт. Заметок: ${count}`, false);
        } catch (err) {
            currentUserId = null;
            currentPassword = null;
            showMessage('authInfoMsg', `❌ Ошибка: ${err.message}`, true);
            refreshUI();
        }
    }

    function logout() {
        currentUserId = null;
        currentPassword = null;
        notesData = { notes: {}, nextId: 1 };
        currentNoteId = null;
        userIdInput.value = '';
        masterPassInput.value = '';
        refreshUI();
        showMessage('authInfoMsg', '🔓 Вы вышли из системы', false);
    }

    async function exportAllBackup() {
        if (!currentUserId || !currentPassword) { 
            showMessage('authInfoMsg', '❌ Авторизуйтесь перед экспортом', true);
            return; 
        }
        
        try {
            const currentNotes = await loadEncryptedNotesCollection(currentUserId, currentPassword);
            
            const backupObject = {
                version: "vc_notes_encrypted_v1",
                userId: currentUserId,
                encryptedData: await encryptData(currentNotes, currentPassword),
                exportedAt: Date.now(),
                hint: "Этот файл зашифрован. Для восстановления нужен тот же пароль."
            };
            
            const jsonStr = JSON.stringify(backupObject, null, 2);
            const blob = new Blob([jsonStr], {type: "application/json"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `vc_notes_${currentUserId}_${Date.now()}.backup.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showMessage('authInfoMsg', '✅ Бэкап создан и зашифрован!', false);
        } catch(e) { 
            showMessage('authInfoMsg', `❌ Ошибка экспорта: ${e.message}`, true);
            console.error(e);
        }
    }

    async function importBackup(file) {
        if (!file) return;
        if (!currentUserId || !currentPassword) { 
            showMessage('authInfoMsg', '❌ Авторизуйтесь перед импортом', true);
            return; 
        }
        
        try {
            const text = await file.text();
            const imported = JSON.parse(text);
            
            if (imported.version !== "vc_notes_encrypted_v1") {
                showMessage('authInfoMsg', '❌ Неподдерживаемый формат бэкапа', true);
                return;
            }
            
            if (imported.userId !== currentUserId) {
                showMessage('authInfoMsg', `❌ ID не совпадает (файл: ${imported.userId}, текущий: ${currentUserId})`, true);
                return;
            }
            
            const decryptedNotes = await decryptData(imported.encryptedData, currentPassword);
            
            if (!decryptedNotes || typeof decryptedNotes !== 'object') {
                throw new Error('Неверная структура данных');
            }
            
            notesData = decryptedNotes;
            if (!notesData.notes) notesData.notes = {};
            if (!notesData.nextId) notesData.nextId = 1;
            
            await saveEncryptedNotesCollection(currentUserId, currentPassword, { notes: notesData.notes, nextId: notesData.nextId });
            
            await refreshUI();
            const count = Object.keys(notesData.notes).length;
            showMessage('authInfoMsg', `✅ Импорт успешен! Загружено ${count} заметок.`, false, 10000);
            showStatusMessage('editorStatusMsg', '📥 Бэкап восстановлен', 3000);
            
        } catch(e) { 
            let errorMsg = e.message;
            if (errorMsg.includes("Неверный пароль") || errorMsg.includes("decrypt")) {
                errorMsg = "Неверный пароль для этого бэкапа";
            }
            showMessage('authInfoMsg', `❌ Ошибка импорта: ${errorMsg}`, true);
        }
    }

    function escapeHtml(str) { 
        return String(str).replace(/[&<>]/g, function(m){ 
            if(m==='&') return '&amp;'; 
            if(m==='<') return '&lt;'; 
            if(m==='>') return '&gt;'; 
            return m;
        }); 
    }

    // Обработчики событий
    authLoginBtn.addEventListener('click', login);
    authLogoutBtn.addEventListener('click', logout);
    createNewNoteBtn.addEventListener('click', createNewNote);
    saveCurrentNoteBtn.addEventListener('click', saveCurrentNote);
    deleteCurrentNoteBtn.addEventListener('click', deleteCurrentNote);
    exportAllNotesBtn.addEventListener('click', exportAllBackup);
    
    // Создаём input для импорта
    const importFileInput = document.createElement('input');
    importFileInput.type = 'file';
    importFileInput.accept = '.json';
    importFileInput.style.display = 'none';
    importFileInput.addEventListener('change', (e) => { 
        if(e.target.files[0]) importBackup(e.target.files[0]); 
        importFileInput.value = ''; 
    });
    document.body.appendChild(importFileInput);
    
    importBackupBtn.onclick = () => importFileInput.click();

    refreshUI();
</script>
</body>
</html>
